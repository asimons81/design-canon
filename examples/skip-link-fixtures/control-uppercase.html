<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Control: uppercase element names</title></head>
<body>
  <A HREF="#main-content">Skip to main content</A>
  <NAV>
    <UL>
      <LI><A HREF="/">Home</A></LI>
    </UL>
  </NAV>
  <MAIN ID="main-content">
    <H1>Main Content</H1>
  </MAIN>
</body>
</html>
