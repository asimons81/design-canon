<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Control: aria-labelledby on skip link</title></head>
<body>
  <span id="skip-label" style="display:none;">Skip to main content</span>
  <a href="#main-content" aria-labelledby="skip-label"></a>
  <nav>
    <ul>
      <li><a href="/">Home</a></li>
    </ul>
  </nav>
  <main id="main-content">
    <h1>Main Content</h1>
  </main>
</body>
</html>
