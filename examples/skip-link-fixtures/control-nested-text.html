<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Control: nested span inside skip link</title></head>
<body>
  <a href="#main-content"><span>Skip to <em>main content</em></span></a>
  <nav>
    <ul>
      <li><a href="/">Home</a></li>
    </ul>
  </nav>
  <main id="main-content">
    <h1>Main Content</h1>
  </main>
</body>
</html>
