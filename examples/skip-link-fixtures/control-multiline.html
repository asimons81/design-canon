<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Control: multiline anchor</title></head>
<body>
  <a
    href="#main-content"
    class="skip-link"
  >Skip to main content</a>
  <nav>
    <ul>
      <li><a href="/">Home</a></li>
    </ul>
  </nav>
  <main id="main-content">
    <h1>Main Content</h1>
  </main>
</body>
</html>
