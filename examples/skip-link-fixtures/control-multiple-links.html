<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Control: multiple links, one valid skip</title></head>
<body>
  <a href="#promo">Promo</a>
  <a href="#main-content">Skip to main content</a>
  <nav>
    <ul>
      <li><a href="/">Home</a></li>
    </ul>
  </nav>
  <div id="promo">Special offer!</div>
  <main id="main-content">
    <h1>Main Content</h1>
  </main>
</body>
</html>
