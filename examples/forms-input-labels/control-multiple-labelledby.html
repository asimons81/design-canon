<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Multiple labelledby</title></head>
<body>
  <form>
    <span id="first">First</span>
    <span id="last">Last</span>
    <span id="missing">This span is empty</span>
    <input type="text" aria-labelledby="first last missing">
  </form>
</body>
</html>
