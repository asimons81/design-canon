<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Viewport Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  .viewport-indicator {
    position: fixed;
    bottom: 0;
    right: 0;
    background: red;
    color: white;
    padding: 4px;
  }
</style>
</head>
<body>
  <h1>Viewport Test</h1>
  <div class="viewport-indicator" id="viewport-info"></div>
  <script>
    document.getElementById('viewport-info').textContent =
      window.innerWidth + 'x' + window.innerHeight;
  </script>
</body>
</html>
