<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Non-Rectangular Clip</title>
<style>
.clip { clip-path: circle(12px at center); overflow: hidden; width: 48px; height: 48px; }
button { width: 48px; height: 48px; padding: 0; border: none; background: #333; color: #fff; }
</style>
</head>
<body><div class="clip"><button>X</button></div></body>
</html>
