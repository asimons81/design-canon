<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nested Interactive with Decorative Child</title>
<style>
  #outer-target {
    display: block;
    width: 100px;
    height: 100px;
    position: relative;
    background: #eee;
  }

  .inner-target {
    position: absolute;
    left: 25px;
    top: 25px;
    width: 50px;
    height: 50px;
    padding: 0;
    border: 0;
  }

  .icon {
    position: absolute;
    inset: 0;
    display: block;
    width: 100%;
    height: 100%;
    background: #333;
  }
</style>
</head>
<body>
  <div id="outer-target" role="button" tabindex="0">
    <button class="inner-target" type="button" aria-label="Inner target">
      <span class="icon" aria-hidden="true"></span>
    </button>
  </div>
</body>
</html>
