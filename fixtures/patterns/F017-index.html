<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Motion fixture</title>
<style>
  .card { animation: fade 300ms ease; }
  .button { transition: transform 200ms; }
  .title { animation-name: slideIn; animation-duration: 1s; }
</style>
</head>
<body>
  <div class="card">Card</div>
  <button class="button">Click</button>
</body>
</html>
