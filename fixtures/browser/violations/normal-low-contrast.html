<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<style>
  body { background: #fff; color: #777; font-family: sans-serif; }
  .low-contrast { color: #aaa; }
</style>
</head>
<body>
  <h1 style="color:#333;">Violation: Normal Low Contrast</h1>
  <p>Body text at #777 on white is about 4.48:1 - below 4.5:1.</p>
  <p class="low-contrast">This text at #aaa on white is about 2.3:1.</p>
</body>
</html>
