<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<style>
  button { transition: transform 0.15s, background 0.15s; }
  button:hover { transform: scale(1.02); background: #e0e0e0; }
  .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3498db; border-radius: 50%; width: 24px; height: 24px; }
</style>
</head>
<body>
  <button>Click me</button>
  <div class="spinner"></div>
  <p>Micro-interactions (hover scale) and non-looping CSS are typically exempt from reduced-motion requirements.</p>
</body>
</html>
