<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  table { width: 100%; border-collapse: collapse; }
  td { height: 36px; padding: 2px 8px; font-size: 13px; border-bottom: 1px solid #eee; }
  td:first-child { width: 44px; }
  input[type=checkbox] { width: 20px; height: 20px; }
</style>
</head>
<body>
  <table>
    <tr><td><input type="checkbox"></td><td>Design guidelines</td><td>Draft</td></tr>
    <tr><td><input type="checkbox"></td><td>Style guide update</td><td>Review</td></tr>
    <tr><td><input type="checkbox"></td><td>Component library</td><td>Complete</td></tr>
  </table>
  <p>36px rows are dense but each row starts with a 44px checkbox column for reliable touch.</p>
</body>
</html>
