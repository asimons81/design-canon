<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<style>
  body { background: #fff; color: #333; font-family: sans-serif; }
  .note { color: #666; font-size: 12px; }
  label { color: #333; font-weight: bold; }
</style>
</head>
<body>
  <h1 style="color: #222;">Welcome</h1>
  <p>This body text passes WCAG AA at ~7.7:1 contrast.</p>
  <label for="s">Search</label><input id="s" placeholder="Search...">
  <p class="note">Caption text at #666 passes AA for large text at 12px bold.</p>
</body>
</html>
