<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<style>
  .card { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); padding: 32px; border-radius: 8px; }
  .card h2 { color: #e0e0e0; }
  .card p { color: #aaa; }
</style>
</head>
<body>
  <div class="card">
    <h2>Dark theme card</h2>
    <p>This text may pass contrast on the dark end of the gradient but could fail on lighter sections. A static checker cannot resolve this.</p>
  </div>
</body>
</html>
