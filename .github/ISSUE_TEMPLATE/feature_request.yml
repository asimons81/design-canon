name: Feature request
description: Propose a scoped capability, rule, profile, or integration.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete failure or workflow gap should be addressed?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: How should this be verified?
      description: Describe observable checks, fixtures, or benchmark criteria.
    validations:
      required: true
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Compiler
        - Linter
        - Rule catalog
        - Profile
        - Agent integration
        - Visual QA
        - Documentation
    validations:
      required: true
