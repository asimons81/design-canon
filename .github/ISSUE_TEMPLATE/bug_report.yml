name: Bug report
description: Report reproducible incorrect behavior.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here. Use a private security advisory.
  - type: input
    id: version
    attributes:
      label: Design Canon version
      placeholder: 0.1.0-alpha.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: 22.0.0
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Exact command
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and output
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Link a small repository or paste the smallest safe fixture.
    validations:
      required: true
