name: Publish Package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Pin npm CLI
        run: npm install --global npm@11.18.0

      - name: Verify release source and package version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          TAG="${{ github.event.release.tag_name }}"
          if [[ "v${VERSION}" != "${TAG}" ]]; then
            echo "Release tag '${TAG}' does not match package version '${VERSION}'." >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "Release tag '${TAG}' is not contained in origin/main." >&2
            exit 1
          fi

      - name: Install without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Verify repository
        run: npm run check

      - name: Test
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Verify package contents
        run: npm pack --dry-run --json > package-report.json

      - name: Check registry state
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          NAME="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")"
          VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          if npm view "${NAME}@${VERSION}" version --json >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${NAME}@${VERSION} is already published; skipping duplicate publication."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.registry.outputs.published != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          if [[ "${VERSION}" == *-* ]]; then
            DIST_TAG=next
          else
            DIST_TAG=latest
          fi
          npm publish --access public --tag "${DIST_TAG}"

      - name: Verify registry integrity
        shell: bash
        run: |
          set -euo pipefail
          NAME="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).name")"
          VERSION="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"
          npm view "${NAME}@${VERSION}" version dist.integrity dist.shasum --json
