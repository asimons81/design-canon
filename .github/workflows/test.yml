name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci --ignore-scripts

      - name: Verify repository
        run: npm run check

      - name: Test
        run: npm test

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Verify package contents
        run: npm pack --dry-run --json > package-report.json

      - name: Smoke-test CLI
        run: |
          node ./bin/design-canon.js --version
          node ./bin/design-canon.js profiles
          node ./bin/design-canon.js compile --profile marketing --target design > /tmp/DESIGN.md

  browser-test:
    name: Browser (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [20]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install with Playwright
        run: |
          npm ci --ignore-scripts
          sudo install -d -o "$(id -u)" -g "$(id -g)" /opt/dcbench/ms-playwright
          PLAYWRIGHT_BROWSERS_PATH=/opt/dcbench/ms-playwright npx playwright install chromium
          echo "DESIGN_CANON_BROWSER_EXECUTABLE=$(PLAYWRIGHT_BROWSERS_PATH=/opt/dcbench/ms-playwright node -e 'console.log(require("playwright").chromium.executablePath())')" >> "$GITHUB_ENV"

      - name: Run browser tests
        run: node --test --test-reporter=spec tests/browser-lifecycle.test.js tests/browser-security-integration.test.js tests/benchmark-b000-browser-repair.test.js

      - name: Verify B000 explicit-browser preflight
        run: |
          node scripts/benchmark-browser-preflight.js \
            --output "${RUNNER_TEMP}/b000-browser-preflight" \
            --browser-executable "${DESIGN_CANON_BROWSER_EXECUTABLE}"

      - name: Verify static output stability
        run: |
          node --test --test-reporter=spec tests/browser-regression.test.js
          node --test --test-reporter=spec tests/browser-schema.test.js
          node --test --test-reporter=spec tests/browser-capability.test.js
          node --test --test-reporter=spec tests/browser-security.test.js
